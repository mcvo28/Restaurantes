<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Restaurantes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#111;--surface:#1C1C1E;--surface2:#2C2C2E;--border:#3A3A3C;
  --text:#F2F2F7;--text2:#8E8E93;--text3:#48484A;
  --accent:#E8622A;--green:#34C759;--red:#FF3B30;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding-bottom:48px}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.topbar-right{display:flex;gap:8px;align-items:center}
.tbtn{background:var(--surface2);border:none;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif}
.tbtn-accent{background:var(--accent);color:#fff}
.search-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:none;border-radius:10px;padding:10px 14px 10px 36px;font-size:15px;color:var(--text);font-family:'Inter',sans-serif;outline:none}
.search-wrap input::placeholder{color:var(--text3)}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;pointer-events:none}
.cats-section{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px}
.cats-wrap{display:flex;flex-wrap:wrap;gap:7px}
.cat-pill{font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.cat-pill.active{color:#fff;border-color:transparent}
.filters-section{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px}
.filters-wrap{display:flex;flex-wrap:wrap;gap:7px}
.f-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:none;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.f-btn.on{background:rgba(232,98,42,.15);color:var(--accent)}
.f-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.f-clear{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;padding:8px 4px}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px}
.list-count{font-size:13px;color:var(--text2)}
.list-count strong{color:var(--text);font-weight:600}
.sort-btn{background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif}
.cards{padding:0 16px}
.card{background:var(--surface);border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;display:flex;border:1px solid var(--border)}
.card:active{opacity:.7}
.card-stripe{width:4px;flex-shrink:0}
.card-body{flex:1;padding:13px 14px;min-width:0}
.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.card-name{font-size:16px;font-weight:600;letter-spacing:-.3px;line-height:1.25}
.card-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.badge-v{background:var(--green);color:#fff}
.badge-n{background:var(--surface2);color:var(--text3)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.ctag{font-size:12px;padding:3px 9px;border-radius:8px;background:var(--surface2);color:var(--text2)}
.ctag-cidade{background:rgba(41,128,185,.18);color:#64AADF}
.card-obs{font-size:12px;color:var(--text3);font-style:italic;margin-top:2px}
.stars{display:flex;gap:1px;margin-top:6px}
.star{font-size:14px;color:var(--text3)}
.star.on{color:#F0A500}
.empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:15px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;backdrop-filter:blur(4px)}
.overlay.show{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:101;max-height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.drawer.show{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px;flex-shrink:0}
.drawer-title{font-size:17px;font-weight:700;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-body{overflow-y:auto;padding:20px;flex:1;-webkit-overflow-scrolling:touch}
.drawer-body::-webkit-scrollbar{display:none}
.d-chips{display:flex;flex-wrap:wrap;gap:10px}
.dchip{font-size:14px;font-weight:500;padding:10px 18px;border-radius:22px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif}
.dchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.drawer-footer{display:flex;gap:10px;padding:14px 20px 36px;border-top:1px solid var(--border);flex-shrink:0}
.d-act{flex:1;padding:13px;border-radius:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:none;background:var(--surface2);color:var(--text2)}
.d-act-primary{background:var(--accent);color:#fff}
.menu-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.menu-drawer.show{transform:translateY(0)}
.menu-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 8px}
.menu-item{display:flex;align-items:center;gap:14px;padding:16px 24px;border:none;background:none;font-family:'Inter',sans-serif;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;text-align:left;width:100%;border-top:1px solid var(--border)}
.menu-item:first-of-type{border-top:none}
.menu-item-icon{font-size:20px;width:28px;text-align:center}
.menu-spacer{height:36px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;backdrop-filter:blur(4px)}
.modal-overlay.show{display:block}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:201;max-height:92vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.modal.show{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px;flex-shrink:0}
.modal-title{font-size:17px;font-weight:700;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-body{overflow-y:auto;padding:16px 20px;flex:1;-webkit-overflow-scrolling:touch}
.modal-body::-webkit-scrollbar{display:none}
.mfield{margin-bottom:16px}
.mfield label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:8px}
.mfield input,.mfield select,.mfield textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:15px;font-family:'Inter',sans-serif;outline:none}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--accent)}
.mfield textarea{resize:none;height:72px;line-height:1.5}
.mfield select option{background:var(--surface2)}
.mchips{display:flex;flex-wrap:wrap;gap:8px}
.mchip{font-size:14px;font-weight:500;padding:9px 16px;border-radius:22px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif}
.mchip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.mchip.sel-m{border-color:var(--accent);color:var(--accent);background:rgba(232,98,42,.12)}
.mstars{display:flex;gap:10px}
.mstar{font-size:30px;cursor:pointer;color:var(--text3)}
.mstar.on{color:#F0A500}
.modal-footer{flex-shrink:0;padding:12px 20px 36px;border-top:1px solid var(--border);display:flex;gap:10px}
.m-act{flex:1;padding:14px;border-radius:13px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:none;background:var(--surface2);color:var(--text2)}
.m-act-primary{background:var(--accent);color:#fff}
.m-act-danger{background:rgba(255,59,48,.1);color:var(--red)}
.cidade-sugs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.csug{font-size:13px;padding:5px 12px;border-radius:12px;background:var(--surface2);color:var(--text2);cursor:pointer;border:none;font-family:'Inter',sans-serif}
</style>
</head>

<div class="topbar">
  <div class="logo">🍽 Restaurantes</div>
  <div class="topbar-right">
    <button class="tbtn tbtn-accent" onclick="openAdd()">+ Novo</button>
    <button class="tbtn" onclick="openMenu()">⋯</button>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap">
    <span class="s-icon">⌕</span>

  </div>
</div>

<div class="cats-section">
  <div class="cats-wrap" id="cats-wrap"></div>
</div>

<div class="filters-section">
  <div class="filters-wrap" id="filters-wrap"></div>
</div>

<div class="list-header">
  <div class="list-count" id="list-count"></div>
  <button class="sort-btn" onclick="cycleSort()">↕ <span id="sort-lbl">A–Z</span></button>
</div>

<div class="cards" id="cards"></div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="drawer-title"></div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="d-act" onclick="clearGroupFilter()">Limpar</button>
    <button class="d-act d-act-primary" onclick="closeDrawer()">Ver resultados</button>
  </div>
</div>

<div class="overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="menu-drawer" id="menu-drawer">
  <div class="menu-handle"></div>
  <button class="menu-item" onclick="exportJSON();closeMenu()">
    <span class="menu-item-icon">↓</span> Exportar backup (.json)
  </button>
  <label class="menu-item" style="cursor:pointer">
    <span class="menu-item-icon">↑</span> Importar backup (.json)
    <input type="file" accept=".json" style="display:none" onchange="importJSON(event);closeMenu()">
  </label>
  <div class="menu-spacer"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-title"></div>
  <div class="modal-body" id="modal-body"></div>
  <div class="modal-footer" id="modal-footer"></div>
</div>

  {n:"Casa Fabri",c:"Café/Padaria",cidade:"São Paulo",v:false,r:0,periodo:["café/brunch","almoço"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Mimada Café",c:"Café/Padaria",cidade:"São Paulo",v:false,r:0,periodo:["café/brunch","almoço"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Nexo",c:"Café/Padaria",cidade:"São Paulo",v:false,r:0,periodo:["café/brunch","almoço"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:"take away"},
  {n:"Brim",c:"Café/Padaria",cidade:"São Paulo",v:false,r:0,periodo:["café/brunch","almoço"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"A Galeteria",c:"Delivery",cidade:"São Paulo",v:true,r:5,periodo:["almoço","jantar"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Seu Osnir",c:"Delivery",cidade:"São Paulo",v:true,r:4,periodo:["almoço"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Tartelier",c:"Sobremesa",cidade:"São Paulo",v:false,r:0,periodo:["almoço","jantar"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Estou Quituteria",c:"Sobremesa",cidade:"São Paulo",v:true,r:4,periodo:["almoço","jantar"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
  {n:"Bachir",c:"Sobremesa",cidade:"São Paulo",v:true,r:5,periodo:["almoço","jantar"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:"sorvete árabe"},
  {n:"Mirá Padaria",c:"Sobremesa",cidade:"São Paulo",v:false,r:0,periodo:["almoço","jantar"],vibe:["casual"],ocasiao:["amigos"],preco:"$",obs:""},
];

const KEY='comidas_v4';
let data=JSON.parse(localStorage.getItem(KEY)||'null')||DEFAULT.map((d,i)=>({...d,id:i}));
data.forEach(r=>{
  if(!r.cidade)r.cidade='São Paulo';
  if(!Array.isArray(r.periodo))r.periodo=[r.periodo||'jantar'];
  if(!Array.isArray(r.vibe))r.vibe=[r.vibe||'casual'];
  if(!Array.isArray(r.ocasiao))r.ocasiao=[r.ocasiao||'amigos'];
  if(r.obs===undefined)r.obs='';
});
let nextId=Math.max(0,...data.map(r=>r.id||0))+1;
let tab='Todos',filters={cidade:[],status:[],periodo:[],vibe:[],ocasiao:[],preco:[]};
let search='',sort='az',editId=null,drawerKey=null;

function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function getCidades(){return[...new Set(data.map(r=>r.cidade||'São Paulo'))].sort();}
function esc(s){return String(s).replace(/'/g,"\\'");}
function filterCount(){return Object.values(filters).reduce((s,a)=>s+a.length,0);}

function exportJSON(){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='restaurantes_backup.json';a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);if(!Array.isArray(d))throw 0;
      data=d;
      data.forEach(r=>{
        if(!r.cidade)r.cidade='São Paulo';
        if(!Array.isArray(r.periodo))r.periodo=[r.periodo||'jantar'];
        if(!Array.isArray(r.vibe))r.vibe=[r.vibe||'casual'];
        if(!Array.isArray(r.ocasiao))r.ocasiao=[r.ocasiao||'amigos'];
        if(r.obs===undefined)r.obs='';
      });
      nextId=Math.max(0,...data.map(r=>r.id||0))+1;
      save();buildAll();alert('Importado! '+d.length+' lugares.');
    }catch{alert('Arquivo inválido.');}
  };
  r.readAsText(f);e.target.value='';
}

function openMenu(){
  document.getElementById('menu-overlay').classList.add('show');
  document.getElementById('menu-drawer').classList.add('show');
}
function closeMenu(){
  document.getElementById('menu-overlay').classList.remove('show');
  document.getElementById('menu-drawer').classList.remove('show');
}
document.getElementById('menu-overlay').onclick=closeMenu;

function buildCats(){
  document.getElementById('cats-wrap').innerHTML=['Todos',...CATS].map(c=>{
    const color=CAT_COLOR[c]||'#555';
    const active=tab===c;
    return`<button class="cat-pill${active?' active':''}" style="${active?`background:${color};border-color:${color}`:''}" onclick="setTab('${esc(c)}')">${c}</button>`;
  }).join('');
}
function setTab(t){tab=t;buildCats();render();}

function buildFilters(){
  const cnt=filterCount();
  document.getElementById('filters-wrap').innerHTML=
    FILTER_GROUPS.map(g=>{
      const n=filters[g.key].length;
      return`<button class="f-btn${n?' on':''}" onclick="openDrawer('${g.key}')">
        ${n?'<span class="f-dot"></span>':''}${g.label}${n?` (${n})`:''}
      </button>`;
    }).join('')+(cnt?`<button class="f-clear" onclick="clearAllFilters()">✕ Limpar</button>`:'');
}

function openDrawer(key){
  drawerKey=key;
  const g=FILTER_GROUPS.find(x=>x.key===key);
  document.getElementById('drawer-title').textContent=g?g.label:'';
  buildDrawerBody();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  buildFilters();render();
}
function clearAllFilters(){Object.keys(filters).forEach(k=>filters[k]=[]);buildDrawerBody();buildFilters();render();}
function clearGroupFilter(){if(drawerKey)filters[drawerKey]=[];buildDrawerBody();}
function buildDrawerBody(){
  const g=FILTER_GROUPS.find(x=>x.key===drawerKey);if(!g)return;
  document.getElementById('drawer-body').innerHTML=`<div class="d-chips">${g.opts().map(o=>`<span class="dchip${filters[g.key].includes(o)?' on':''}" onclick="toggleF('${g.key}','${esc(o)}')">${o}</span>`).join('')}</div>`;
}
function toggleF(key,val){const a=filters[key],i=a.indexOf(val);if(i>-1)a.splice(i,1);else a.push(val);buildDrawerBody();}

function filtered(){
  return data.filter(r=>{
    if(tab!=='Todos'&&r.c!==tab)return false;
    if(search&&!r.n.toLowerCase().includes(search.toLowerCase()))return false;
    if(filters.cidade.length&&!filters.cidade.includes(r.cidade||'São Paulo'))return false;
    if(filters.status.length){
      const wV=filters.status.includes('visitado'),wA=filters.status.includes('a visitar');
      if(wV&&!wA&&!r.v)return false;
      if(wA&&!wV&&r.v)return false;
    }
    if(filters.periodo.length&&!filters.periodo.some(f=>r.periodo.includes(f)))return false;
    if(filters.vibe.length&&!filters.vibe.some(f=>r.vibe.includes(f)))return false;
    if(filters.ocasiao.length&&!filters.ocasiao.some(f=>r.ocasiao.includes(f)))return false;
    if(filters.preco.length&&!filters.preco.includes(r.preco))return false;
    return true;
  });
}
function cycleSort(){
  sort=sort==='az'?'za':sort==='za'?'rating':'az';
  document.getElementById('sort-lbl').textContent=sort==='az'?'A–Z':sort==='za'?'Z–A':'Nota';
  render();
}
function render(){
  const list=[...filtered()].sort((a,b)=>sort==='az'?a.n.localeCompare(b.n,'pt'):sort==='za'?b.n.localeCompare(a.n,'pt'):(b.r||0)-(a.r||0));
  const cnt=list.length;
  document.getElementById('list-count').innerHTML=`<strong>${cnt}</strong> lugar${cnt!==1?'es':''}`;
  const el=document.getElementById('cards');
  if(!cnt){el.innerHTML=`<div class="empty">Nenhum lugar encontrado.</div>`;return;}
  el.innerHTML=list.map(r=>{
    const cc=CAT_COLOR[r.c]||'#555';
    const tags=[...r.periodo,...r.vibe,...r.ocasiao,r.preco];
    const cidTag=r.cidade&&r.cidade!=='São Paulo'?`<span class="ctag ctag-cidade">${r.cidade}</span>`:'';
    const stars=r.v&&r.r?`<div class="stars">${[1,2,3,4,5].map(i=>`<span class="star${i<=r.r?' on':''}">★</span>`).join('')}</div>`:'';
    return`<div class="card" onclick="openEdit(${r.id})">
      <div class="card-stripe" style="background:${cc}"></div>
      <div class="card-body">
        <div class="card-row1"><div class="card-name">${r.n}</div><div class="card-badge ${r.v?'badge-v':'badge-n'}">${r.v?'✓':'·'}</div></div>
        <div class="card-tags">${tags.map(t=>`<span class="ctag">${t}</span>`).join('')}${cidTag}</div>
        ${r.obs?`<div class="card-obs">${r.obs}</div>`:''}
        ${stars}
      </div>
    </div>`;
  }).join('');
}

function openAdd(){showModal(null);}
function openEdit(id){showModal(data.find(r=>r.id===id));}
function showModal(r){
  const isNew=!r;
  editId=isNew?null:r.id;
  const d=r||{n:'',c:'Restaurantes',cidade:'São Paulo',v:false,r:0,periodo:['jantar'],vibe:['casual'],ocasiao:['amigos'],preco:'$$',obs:''};
  window._md={...d,periodo:[...d.periodo],vibe:[...d.vibe],ocasiao:[...d.ocasiao]};
  document.getElementById('modal-title').textContent=isNew?'Novo lugar':'Editar lugar';
  const cids=getCidades();
  document.getElementById('modal-body').innerHTML=`
    <div class="mfield"><label>Nome</label><input id="m-n" value="${d.n.replace(/"/g,'&quot;')}" placeholder="Nome do restaurante"></div>
    <div class="mfield"><label>Categoria</label><select id="m-c">${CATS.map(c=>`<option${c===d.c?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="mfield"><label>Cidade</label>
      <input id="m-cidade" value="${d.cidade||'São Paulo'}" placeholder="São Paulo" oninput="updCidSugs(this.value)">
      <div class="cidade-sugs" id="cid-sugs">${cids.map(c=>`<button class="csug" onclick="setCid('${esc(c)}')">${c}</button>`).join('')}</div></div>
    <div class="mfield"><label>Período</label><div class="mchips">${PERIODOS.map(o=>`<span class="mchip${d.periodo.includes(o)?' sel-m':''}" data-f="periodo" data-v="${esc(o)}" onclick="togM(this)">${o}</span>`).join('')}</div></div>
    <div class="mfield"><label>Vibe</label><div class="mchips">${VIBES.map(o=>`<span class="mchip${d.vibe.includes(o)?' sel-m':''}" data-f="vibe" data-v="${esc(o)}" onclick="togM(this)">${o}</span>`).join('')}</div></div>
    <div class="mfield"><label>Ocasião</label><div class="mchips">${OCASIOES.map(o=>`<span class="mchip${d.ocasiao.includes(o)?' sel-m':''}" data-f="ocasiao" data-v="${esc(o)}" onclick="togM(this)">${o}</span>`).join('')}</div></div>
    <div class="mfield"><label>Preço</label><div class="mchips">${PRECOS.map(o=>`<span class="mchip${d.preco===o?' sel':''}" data-f="preco" data-v="${o}" onclick="togS(this)">${o}</span>`).join('')}</div></div>
    <div class="mfield"><label>Visitado?</label><div class="mchips">
      <span class="mchip${d.v?' sel':''}" data-f="v" data-v="true" onclick="togS(this)">Sim ✓</span>
      <span class="mchip${!d.v?' sel':''}" data-f="v" data-v="false" onclick="togS(this)">Não</span>
    </div></div>
    <div class="mfield"><label>Nota</label><div class="mstars">${[1,2,3,4,5].map(s=>`<span class="mstar${s<=(d.r||0)?' on':''}" onclick="setStars(${s})">★</span>`).join('')}</div></div>
    <div class="mfield"><label>Observação</label><textarea id="m-obs" placeholder="ex: pedir a burrata, só com reserva...">${d.obs||''}</textarea></div>`;
  document.getElementById('modal-footer').innerHTML=
    (!isNew?`<button class="m-act m-act-danger" onclick="delPlace(${d.id})">Excluir</button>`:'')
    +`<button class="m-act" onclick="closeModal()" style="${isNew?'margin-left:auto':''}">Cancelar</button>
    <button class="m-act m-act-primary" onclick="saveModal()">${isNew?'Adicionar':'Salvar'}</button>`;
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('modal').classList.add('show'),10);
  setTimeout(()=>document.getElementById('m-n').focus(),350);
}
function togM(el){
  const f=el.dataset.f,v=el.dataset.v,arr=window._md[f];
  const i=arr.indexOf(v);if(i>-1)arr.splice(i,1);else arr.push(v);
  el.classList.toggle('sel-m',arr.includes(v));
}
function togS(el){
  const f=el.dataset.f,v=el.dataset.v;
  el.closest('.mchips').querySelectorAll('.mchip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  window._md[f]=v==='true'?true:v==='false'?false:v;
}
function setStars(s){
  document.querySelectorAll('.mstar').forEach((el,i)=>el.classList.toggle('on',i<s));
  window._md.r=s;
  if(s>0){window._md.v=true;document.querySelectorAll('[data-f="v"]').forEach(el=>el.classList.toggle('sel',el.dataset.v==='true'));}
}
function setCid(c){document.getElementById('m-cidade').value=c;window._md.cidade=c;}
function updCidSugs(val){
  window._md.cidade=val;
  const f=val?getCidades().filter(c=>c.toLowerCase().includes(val.toLowerCase())):getCidades();
  const el=document.getElementById('cid-sugs');
  if(el)el.innerHTML=f.map(c=>`<button class="csug" onclick="setCid('${esc(c)}')">${c}</button>`).join('');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-overlay').classList.remove('show');
}
function saveModal(){
  const nome=document.getElementById('m-n').value.trim();if(!nome)return;
  const md=window._md;
  const obj={n:nome,c:document.getElementById('m-c').value,
    cidade:document.getElementById('m-cidade').value.trim()||'São Paulo',
    v:md.v===true||md.v==='true',r:md.r||0,
    periodo:md.periodo.length?md.periodo:['jantar'],
    vibe:md.vibe.length?md.vibe:['casual'],
    ocasiao:md.ocasiao.length?md.ocasiao:['amigos'],
    preco:md.preco||'$$',obs:document.getElementById('m-obs').value.trim()};
  if(editId===null){obj.id=nextId++;data.push(obj);}
  else{const i=data.findIndex(r=>r.id===editId);if(i>-1)data[i]={...data[i],...obj};}
  save();closeModal();buildAll();
}
function delPlace(id){
  if(!confirm('Excluir?'))return;
  data=data.filter(r=>r.id!==id);save();closeModal();buildAll();
}

function buildAll(){buildCats();buildFilters();render();}
document.getElementById('search').addEventListener('input',e=>{search=e.target.value;render();});
buildAll();
</script>
</body>
</html>
