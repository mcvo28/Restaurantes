<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comidas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #141414;
  --surface: #1F1F1F;
  --surface2: #2A2A2A;
  --border: #333;
  --text: #F0EBE1;
  --text2: #888;
  --text3: #555;
  --accent: #E8622A;
  --accent2: #FF8C5A;
  --green: #2D6A4F;
  --green-light: #3D8A65;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{
  background:rgba(20,20,20,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:12px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;letter-spacing:-.4px}
.logo-count{font-size:12px;color:var(--text2);font-weight:400}
.topbar-actions{display:flex;gap:6px;align-items:center}
.search-wrap{position:relative}
.search-wrap input{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;
  padding:7px 12px 7px 32px;font-size:13px;width:160px;
  outline:none;font-family:'Inter',sans-serif;
  transition:border-color .2s,width .2s;
}
.search-wrap input:focus{border-color:var(--accent);width:200px}
.search-wrap input::placeholder{color:var(--text3)}
.s-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.tbtn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;padding:7px 12px;
  font-size:12px;font-weight:500;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--text2);color:var(--text)}
.tbtn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn-accent:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 58px)}

/* SIDEBAR */
.sidebar{
  width:200px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky;top:58px;
  height:calc(100vh - 58px);
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:0}
.sb-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);
  padding:0 16px;margin-bottom:6px;
}
.sb-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:8px 16px;
  border:none;background:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;
  color:var(--text2);border-radius:0;
  transition:all .15s;text-align:left;
}
.sb-btn:hover{background:var(--surface2);color:var(--text)}
.sb-btn.active{color:var(--text);background:var(--surface2)}
.sb-btn.active .sb-dot{opacity:1}
.sb-dot{
  width:6px;height:6px;border-radius:50%;
  flex-shrink:0;opacity:0;transition:opacity .15s;
}
.sb-divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.sb-count{
  margin-left:auto;font-size:11px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text3);padding:1px 7px;border-radius:10px;
}
.sb-btn.active .sb-count{background:var(--surface2)}

/* CAT COLORS */
.cat-Pizzas{background:#E8622A}
.cat-Hamburgueria{background:#C0392B}
.cat-Sushi{background:#2980B9}
.cat-Restaurantes{background:#8E44AD}
.cat-Bares{background:#D4AC0D}
.cat-Cafe{background:#27AE60}
.cat-Delivery{background:#E67E22}
.cat-Sobremesa{background:#E91E8C}

/* MAIN */
.main{flex:1;padding:20px;min-width:0}

/* FILTERS */
.filters-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:18px;
}
.filter-row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-start}
.filter-group{display:flex;flex-direction:column;gap:5px}
.fg-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);
}
.fg-chips{display:flex;flex-wrap:wrap;gap:4px}
.fchip{
  font-size:12px;padding:4px 11px;border-radius:20px;
  border:1px solid var(--border);cursor:pointer;
  background:transparent;color:var(--text2);
  font-family:'Inter',sans-serif;font-weight:500;
  transition:all .15s;
}
.fchip:hover{border-color:var(--text2);color:var(--text)}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-divider{width:1px;background:var(--border);align-self:stretch;margin:0 4px}

/* GRID */
.grid-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.grid-title{font-size:13px;color:var(--text2)}
.grid-title strong{color:var(--text);font-weight:600}
.sort-btn{
  font-size:12px;color:var(--text2);background:none;
  border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .15s;
}
.sort-btn:hover{color:var(--text);border-color:var(--text2)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

/* CARD */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;cursor:pointer;
  transition:border-color .2s,transform .15s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.card:hover{
  border-color:var(--text3);
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.card-stripe{
  position:absolute;left:0;top:0;bottom:0;width:3px;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.card-name{font-size:14px;font-weight:600;line-height:1.3;letter-spacing:-.2px}
.card-status{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;margin-top:1px;
}
.status-v{background:var(--green);color:#fff}
.status-n{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.card-cidade{
  font-size:11px;color:var(--text3);margin-bottom:6px;
  display:flex;align-items:center;gap:4px;
}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.ctag{
  font-size:11px;padding:2px 8px;border-radius:8px;
  background:var(--surface2);color:var(--text2);
  border:1px solid var(--border);
}
.ctag-cidade{background:rgba(41,128,185,.15);color:#5dade2;border-color:rgba(41,128,185,.3)}
.card-obs{
  font-size:11px;color:var(--text3);
  border-top:1px solid var(--border);
  padding-top:6px;margin-top:4px;
  font-style:italic;line-height:1.4;
}
.stars{display:flex;gap:2px;margin-top:6px}
.star{font-size:12px;color:var(--text3)}
.star.on{color:#F0A500}
.empty-state{
  grid-column:1/-1;
  padding:60px 20px;text-align:center;
  color:var(--text3);
}
.empty-state .e-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

/* MODAL */
.backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;
  backdrop-filter:blur(4px);
}
@media(min-width:600px){
  .backdrop{align-items:center}
  .modal{border-radius:16px!important;max-width:420px;width:100%}
}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:24px;width:100%;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
}
.modal::-webkit-scrollbar{width:0}
.modal-handle{
  width:36px;height:4px;background:var(--border);
  border-radius:2px;margin:0 auto 20px;
}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px;letter-spacing:-.3px}
.mfield{margin-bottom:14px}
.mfield label{
  font-size:11px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);
  display:block;margin-bottom:6px;
}
.mfield input,.mfield select,.mfield textarea{
  width:100%;padding:10px 12px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);
  font-size:14px;font-family:'Inter',sans-serif;outline:none;
}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--accent)}
.mfield textarea{resize:none;height:64px;line-height:1.5}
.mfield select option{background:var(--surface2)}
.mchips{display:flex;flex-wrap:wrap;gap:6px}
.mchip{
  font-size:13px;padding:6px 13px;border-radius:20px;
  border:1px solid var(--border);cursor:pointer;
  background:transparent;color:var(--text2);
  font-family:'Inter',sans-serif;font-weight:500;
  transition:all .15s;
}
.mchip:hover{border-color:var(--text2);color:var(--text)}
.mchip.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.mchip.sel-multi{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.mstars{display:flex;gap:8px;margin-top:4px}
.mstar{font-size:26px;cursor:pointer;color:var(--text3);transition:color .15s;line-height:1}
.mstar.on{color:#F0A500}
.modal-actions{
  display:flex;gap:8px;margin-top:20px;
  padding-top:16px;border-top:1px solid var(--border);
}
.mact{
  flex:1;padding:11px;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);transition:all .15s;
}
.mact:hover{color:var(--text);border-color:var(--text2)}
.mact-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.mact-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.mact-danger{color:#e74c3c;background:transparent}
.mact-danger:hover{background:rgba(231,76,60,.1);border-color:#e74c3c}
.cidade-sugs{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.csug{
  font-size:12px;padding:3px 10px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;transition:all .15s;
}
.csug:hover{border-color:var(--accent);color:var(--accent)}

/* MOBILE */
@media(max-width:700px){
  .sidebar{display:none}
  .mob-cats{
    display:flex;gap:6px;overflow-x:auto;padding:12px 16px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .mob-cats::-webkit-scrollbar{height:0}
  .mob-cat{
    flex-shrink:0;font-size:12px;font-weight:600;
    padding:6px 14px;border-radius:20px;
    border:1px solid var(--border);background:transparent;
    color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;
    transition:all .15s;white-space:nowrap;
  }
  .mob-cat.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .main{padding:14px}
  .filters-bar{padding:12px}
  .search-wrap input{width:130px}
  .search-wrap input:focus{width:150px}
  .tbtn span{display:none}
}
@media(min-width:701px){
  .mob-cats{display:none}
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
const KEY='comidas_v3';
let data=JSON.parse(localStorage.getItem(KEY)||'null')||DEFAULT.map((d,i)=>({...d,id:i}));
// migrate old format
data.forEach(r=>{
  if(!r.cidade)r.cidade='São Paulo';
  if(!Array.isArray(r.periodo))r.periodo=[r.periodo||'jantar'];
  if(!Array.isArray(r.vibe))r.vibe=[r.vibe||'casual'];
  if(!Array.isArray(r.ocasiao))r.ocasiao=[r.ocasiao||'amigos'];
  if(r.obs===undefined)r.obs='';
});
let nextId=Math.max(0,...data.map(r=>r.id||0))+1;
let activeTab='Todos';
let filters={cidade:[],status:[],periodo:[],vibe:[],ocasiao:[],preco:[]};
let search='';
let sortMode='az'; // az | za | rating
let modal=null;

function save(){localStorage.setItem(KEY,JSON.stringify(data));}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function getCidades(){return[...new Set(data.map(r=>r.cidade||'São Paulo'))].sort();}
function getCatCount(cat){return cat==='Todos'?data.length:data.filter(r=>r.c===cat).length;}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportJSON(){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='comidas_backup.json';a.click();
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw 0;
      data=d;
      data.forEach(r=>{
        if(!r.cidade)r.cidade='São Paulo';
        if(!Array.isArray(r.periodo))r.periodo=[r.periodo||'jantar'];
        if(!Array.isArray(r.vibe))r.vibe=[r.vibe||'casual'];
        if(!Array.isArray(r.ocasiao))r.ocasiao=[r.ocasiao||'amigos'];
        if(r.obs===undefined)r.obs='';
      });
      nextId=Math.max(0,...data.map(r=>r.id||0))+1;
      save();buildAll();
      alert('Importado! '+d.length+' lugares.');
    }catch{alert('Arquivo inválido.');}
  };
  r.readAsText(f);e.target.value='';
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const cats=['Todos',...CATS];
  sb.innerHTML=`<div style="padding:0 0 8px"><div class="sb-label">Categorias</div>`+
    cats.map(c=>{
      const color=CAT_COLOR[c]||'#555';
      const cnt=getCatCount(c);
      return`<button class="sb-btn${activeTab===c?' active':''}" onclick="setTab('${c}')">
        <span class="sb-dot" style="background:${color}"></span>
        <span style="flex:1">${c}</span>
        <span class="sb-count">${cnt}</span>
      </button>`;
    }).join('')+`</div>`;
}

function buildMobCats(){
  const el=document.getElementById('mob-cats');
  const cats=['Todos',...CATS];
  el.innerHTML=cats.map(c=>
    `<button class="mob-cat${activeTab===c?' active':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function setTab(t){activeTab=t;buildSidebar();buildMobCats();render();}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters(){
  function grp(label,key,opts){
    const active=filters[key];
    return`<div class="filter-group">
      <div class="fg-label">${label}</div>
      <div class="fg-chips">${opts.map(o=>
        `<span class="fchip${active.includes(o)?' on':''}" onclick="toggleF('${key}','${esc(o)}')">${o}</span>`
      ).join('')}</div>
    </div>`;
  }
  document.getElementById('filter-row').innerHTML=
    grp('Cidade','cidade',getCidades())+
    `<div class="filter-divider"></div>`+
    grp('Status','status',['visitado','a visitar'])+
    `<div class="filter-divider"></div>`+
    grp('Período','periodo',PERIODOS)+
    `<div class="filter-divider"></div>`+
    grp('Vibe','vibe',VIBES)+
    `<div class="filter-divider"></div>`+
    grp('Ocasião','ocasiao',OCASIOES)+
    `<div class="filter-divider"></div>`+
    grp('Preço','preco',PRECOS);
}

function esc(s){return s.replace(/'/g,"\\'");}

function toggleF(key,val){
  const a=filters[key];
  const i=a.indexOf(val);
  if(i>-1)a.splice(i,1);else a.push(val);
  buildFilters();render();
}

// ── FILTER LOGIC ──────────────────────────────────────────────────────────────
function arrMatch(filterArr,itemArr){
  // at least one in common
  return filterArr.every(f=>itemArr.includes(f))||filterArr.some(f=>itemArr.includes(f));
}
function filtered(){
  return data.filter(r=>{
    if(activeTab!=='Todos'&&r.c!==activeTab)return false;
    if(search&&!r.n.toLowerCase().includes(search.toLowerCase()))return false;
    if(filters.cidade.length&&!filters.cidade.includes(r.cidade||'São Paulo'))return false;
    if(filters.status.length){
      const wV=filters.status.includes('visitado');
      const wA=filters.status.includes('a visitar');
      if(wV&&!wA&&!r.v)return false;
      if(wA&&!wV&&r.v)return false;
    }
    if(filters.periodo.length&&!filters.periodo.some(f=>r.periodo.includes(f)))return false;
    if(filters.vibe.length&&!filters.vibe.some(f=>r.vibe.includes(f)))return false;
    if(filters.ocasiao.length&&!filters.ocasiao.some(f=>r.ocasiao.includes(f)))return false;
    if(filters.preco.length&&!filters.preco.includes(r.preco))return false;
    return true;
  });
}

function sorted(list){
  return [...list].sort((a,b)=>{
    if(sortMode==='az')return a.n.localeCompare(b.n,'pt');
    if(sortMode==='za')return b.n.localeCompare(a.n,'pt');
    if(sortMode==='rating')return(b.r||0)-(a.r||0);
    return 0;
  });
}

function toggleSort(){
  if(sortMode==='az')sortMode='za';
  else if(sortMode==='za')sortMode='rating';
  else sortMode='az';
  document.getElementById('sort-label').textContent=
    sortMode==='az'?'A–Z':sortMode==='za'?'Z–A':'Nota';
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function starsHtml(r){
  if(!r.v||!r.r)return'';
  return`<div class="stars">${[1,2,3,4,5].map(i=>
    `<span class="star${i<=r.r?' on':''}">★</span>`).join('')}</div>`;
}

function render(){
  const list=sorted(filtered());
  const total=data.length;
  document.getElementById('count-label').textContent=`${list.length} de ${total}`;
  document.getElementById('grid-title').innerHTML=
    `<strong>${list.length}</strong> lugar${list.length!==1?'es':''}`;

  const g=document.getElementById('grid');
  if(!list.length){
    g.innerHTML=`<div class="empty-state"><div class="e-icon">🍽</div><p>Nenhum lugar com esses filtros.</p></div>`;
    return;
  }
  const color=CAT_COLOR[activeTab]||'#555';
  g.innerHTML=list.map(r=>{
    const cc=CAT_COLOR[r.c]||'#555';
    const tags=[...r.periodo,...r.vibe,...r.ocasiao,r.preco];
    const cidadeTag=(r.cidade&&r.cidade!=='São Paulo')?`<span class="ctag ctag-cidade">${r.cidade}</span>`:'';
    return`<div class="card${r.v?' v':''}" onclick="openEdit(${r.id})">
      <div class="card-stripe" style="background:${cc}"></div>
      <div style="padding-left:6px">
        <div class="card-top">
          <div class="card-name">${r.n}</div>
          <div class="card-status ${r.v?'status-v':'status-n'}">${r.v?'✓':'·'}</div>
        </div>
        <div class="card-tags">
          ${tags.map(t=>`<span class="ctag">${t}</span>`).join('')}
          ${cidadeTag}
        </div>
        ${r.obs?`<div class="card-obs">${r.obs}</div>`:''}
        ${starsHtml(r)}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openAdd(){showModal(null);}
function openEdit(id){showModal(data.find(r=>r.id===id));}

function multiChips(opts,field,current){
  return opts.map(o=>`<span class="mchip${current.includes(o)?' sel-multi':''}"
    data-field="${field}" data-val="${esc(o)}" onclick="toggleMChip(this)">${o}</span>`).join('');
}
function singleChips(opts,field,current){
  return opts.map(o=>`<span class="mchip${current===o?' sel':''}"
    data-field="${field}" data-val="${esc(o)}" onclick="singleChip(this)">${o}</span>`).join('');
}

function showModal(r){
  const isNew=!r;
  const d=r||{n:'',c:'Restaurantes',cidade:'São Paulo',v:false,r:0,
    periodo:['jantar'],vibe:['casual'],ocasiao:['amigos'],preco:'$$',obs:''};
  window._md={...d,
    periodo:[...d.periodo],vibe:[...d.vibe],ocasiao:[...d.ocasiao]};

  const cids=getCidades();
  const bd=document.createElement('div');
  bd.className='backdrop';
  bd.innerHTML=`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3>${isNew?'Novo lugar':'Editar lugar'}</h3>
    <div class="mfield"><label>Nome</label>
      <input id="m-n" value="${d.n.replace(/"/g,'&quot;')}" placeholder="Nome do restaurante" autofocus></div>
    <div class="mfield"><label>Categoria</label>
      <select id="m-c">${CATS.map(c=>`<option${c===d.c?' selected':''}>${c}</option>`).join('')}</select></div>
    <div class="mfield"><label>Cidade</label>
      <input id="m-cidade" value="${d.cidade||'São Paulo'}" placeholder="São Paulo" oninput="updateCidSugs(this.value)">
      <div class="cidade-sugs" id="cid-sugs">${cids.map(c=>`<span class="csug" onclick="setCid('${esc(c)}')">${c}</span>`).join('')}</div>
    </div>
    <div class="mfield"><label>Período (múltiplo)</label>
      <div class="mchips">${multiChips(PERIODOS,'periodo',window._md.periodo)}</div></div>
    <div class="mfield"><label>Vibe (múltiplo)</label>
      <div class="mchips">${multiChips(VIBES,'vibe',window._md.vibe)}</div></div>
    <div class="mfield"><label>Ocasião (múltiplo)</label>
      <div class="mchips">${multiChips(OCASIOES,'ocasiao',window._md.ocasiao)}</div></div>
    <div class="mfield"><label>Preço</label>
      <div class="mchips">${singleChips(PRECOS,'preco',d.preco)}</div></div>
    <div class="mfield"><label>Visitado?</label>
      <div class="mchips">
        <span class="mchip${d.v?' sel':''}" data-field="v" data-val="true" onclick="singleChip(this)">Sim ✓</span>
        <span class="mchip${!d.v?' sel':''}" data-field="v" data-val="false" onclick="singleChip(this)">Não</span>
      </div></div>
    <div class="mfield"><label>Nota</label>
      <div class="mstars">${[1,2,3,4,5].map(s=>
        `<span class="mstar${s<=(d.r||0)?' on':''}" onclick="setStars(${s})">★</span>`).join('')}</div></div>
    <div class="mfield"><label>Observação</label>
      <textarea id="m-obs" placeholder="ex: pedir a burrata, só aceita reserva...">${d.obs||''}</textarea></div>
    <div class="modal-actions">
      ${!isNew?`<button class="mact mact-danger" onclick="delPlace(${d.id})">Excluir</button>`:''}
      <button class="mact" onclick="closeModal()" style="${isNew?'margin-left:auto':''}">Cancelar</button>
      <button class="mact mact-primary" onclick="saveModal(${isNew?'null':d.id})">${isNew?'Adicionar':'Salvar'}</button>
    </div>
  </div>`;
  bd.addEventListener('click',closeModal);
  document.body.appendChild(bd);
  modal=bd;
}

function toggleMChip(el){
  const field=el.dataset.field;
  const val=el.dataset.val;
  const arr=window._md[field];
  const i=arr.indexOf(val);
  if(i>-1)arr.splice(i,1);else arr.push(val);
  el.classList.toggle('sel-multi',arr.includes(val));
}
function singleChip(el){
  const field=el.dataset.field;
  const val=el.dataset.val;
  el.closest('.mchips').querySelectorAll('.mchip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  window._md[field]=val==='true'?true:val==='false'?false:val;
}
function setStars(s){
  document.querySelectorAll('.mstar').forEach((el,i)=>el.classList.toggle('on',i<s));
  window._md.r=s;
  if(s>0)window._md.v=true;
  document.querySelectorAll('.mchip[data-field="v"]').forEach(el=>{
    el.classList.toggle('sel',el.dataset.val===(s>0?'true':'false'));
  });
}
function setCid(c){
  document.getElementById('m-cidade').value=c;
  window._md.cidade=c;
}
function updateCidSugs(val){
  window._md.cidade=val;
  const all=getCidades();
  const f=val?all.filter(c=>c.toLowerCase().includes(val.toLowerCase())):all;
  const el=document.getElementById('cid-sugs');
  if(el)el.innerHTML=f.map(c=>`<span class="csug" onclick="setCid('${esc(c)}')">${c}</span>`).join('');
}
function closeModal(){if(modal){modal.remove();modal=null;}}

function saveModal(id){
  const nome=document.getElementById('m-n').value.trim();
  if(!nome)return;
  const md=window._md;
  const obj={
    n:nome,
    c:document.getElementById('m-c').value,
    cidade:(document.getElementById('m-cidade').value.trim()||'São Paulo'),
    v:md.v===true||md.v==='true',
    r:md.r||0,
    periodo:md.periodo.length?md.periodo:['jantar'],
    vibe:md.vibe.length?md.vibe:['casual'],
    ocasiao:md.ocasiao.length?md.ocasiao:['amigos'],
    preco:md.preco||'$$',
    obs:document.getElementById('m-obs').value.trim(),
  };
  if(id===null){obj.id=nextId++;data.push(obj);}
  else{const i=data.findIndex(r=>r.id===id);if(i>-1)data[i]={...data[i],...obj};}
  save();closeModal();buildAll();
}

function delPlace(id){
  if(!confirm('Excluir este lugar?'))return;
  data=data.filter(r=>r.id!==id);
  save();closeModal();buildAll();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function buildAll(){buildSidebar();buildMobCats();buildFilters();render();}
document.getElementById('search').addEventListener('input',e=>{search=e.target.value;render();});
buildAll();
</script>
